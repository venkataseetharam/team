name: Update NISAR Subsidence Data

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-nisar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run NISAR data pipeline
        run: python scripts/fetch_nisar.py --output data/nisar_subsidence.csv
        env:
          EARTHDATA_USER: ${{ secrets.EARTHDATA_USER }}
          EARTHDATA_PASS: ${{ secrets.EARTHDATA_PASS }}

      - name: Commit and push CSV
        uses: EndBug/add-and-commit@v9
        with:
          default_author: user_info
          author_name: venkataseetharam
          author_email: pendekantiseetharam@gmail.com
          message: "chore: update NISAR subsidence data"
          add: "data/nisar_subsidence.csv"
          push: true
          pull: "--rebase --autostash"
